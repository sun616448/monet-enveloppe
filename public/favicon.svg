<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9d3ea"/>
      <stop offset="0.55" stop-color="#bcc6db"/>
      <stop offset="1" stop-color="#7fa6ab"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5a97a0"/>
      <stop offset="1" stop-color="#2b7a86"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#sky)"/>
  <rect y="19" width="32" height="13" rx="0" fill="url(#water)"/>
  <!-- impressionist water strokes -->
  <g stroke-linecap="round" opacity="0.85">
    <line x1="4" y1="23" x2="12" y2="23" stroke="#c7dfe0" stroke-width="1.4"/>
    <line x1="18" y1="25" x2="27" y2="25" stroke="#a9d0d2" stroke-width="1.4"/>
    <line x1="6" y1="28" x2="16" y2="28" stroke="#e6b9a8" stroke-width="1.2"/>
    <line x1="19" y1="29" x2="26" y2="29" stroke="#cfe4e4" stroke-width="1.2"/>
  </g>
  <!-- a hazy dome / reflection catching the light -->
  <circle cx="16" cy="14" r="5" fill="#efe7dd" opacity="0.9"/>
  <circle cx="16" cy="14" r="5" fill="#e7c8a6" opacity="0.35"/>
</svg>
